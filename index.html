<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haseeb | Financial Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-income: #00ffcc;
            --primary-expense: #ff3366;
            --bg-dark: #0a0a0c;
            --bg-card: rgba(22, 22, 26, 0.8);
            --text-light: #e0e0e0;
        }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark); color: var(--text-light);
            background-image: radial-gradient(circle at top right, rgba(0, 255, 204, 0.05), transparent 40%);
        }
        header { padding: 30px 50px; border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        header h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        header h1 span { color: var(--primary-income); }
        .dashboard-container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        #status-message { text-align: center; font-size: 20px; color: var(--primary-income); padding: 50px; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 40px; }
        .card { background: var(--bg-card); border-radius: 20px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .card h3 { margin: 0; color: #888; text-transform: uppercase; font-size: 14px; }
        .card h2 { margin: 10px 0 0 0; font-size: 36px; }
        .income-text { color: var(--primary-income); }
        .expense-text { color: var(--primary-expense); }
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .chart-box { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .canvas-container { position: relative; height: 350px; width: 100%; }
        @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header><h1>HASEEB <span>DATA.</span></h1></header>
    <div class="dashboard-container">
        <div id="status-message"><i class="fas fa-spinner fa-spin"></i> Analyzing Haseeb's Data...</div>
        <div id="dashboard-content" style="display: none;">
            <div class="summary-cards">
                <div class="card"><h3>Total Income</h3><h2 class="income-text" id="total-income">0</h2></div>
                <div class="card"><h3>Total Expenses</h3><h2 class="expense-text" id="total-expense">0</h2></div>
                <div class="card"><h3>Net Balance</h3><h2 id="net-balance">0</h2></div>
            </div>
            <div class="charts-grid">
                <div class="chart-box"><h3>Timeline (Daily Flow)</h3><div class="canvas-container"><canvas id="timelineChart"></canvas></div></div>
                <div class="chart-box"><h3>Expense Breakdown</h3><div class="canvas-container"><canvas id="expenseCategoryChart"></canvas></div></div>
            </div>
        </div>
    </div>
    <script>
        const formatter = new Intl.NumberFormat('en-US');
        function buildDashboard(rows) {
            let totalIncome = 0, totalExpense = 0;
            let dates = [], incomeByDate = {}, expenseByDate = {}, expensesBySub = {};

            rows.forEach((row, index) => {
                if (index === 0 || !row[1] || !row[3]) return; // Skip header/empty
                
                let category = row[1].trim().toLowerCase();
                let subCategory = row[2].trim();
                let amount = parseFloat(row[3]) || 0;
                let date = row[4].trim();

                if (!dates.includes(date)) {
                    dates.push(date); incomeByDate[date] = 0; expenseByDate[date] = 0;
                }

                if (category.includes('income')) {
                    totalIncome += amount; incomeByDate[date] += amount;
                } else if (category.includes('expence') || category.includes('expense')) {
                    totalExpense += amount; expenseByDate[date] += amount;
                    expensesBySub[subCategory] = (expensesBySub[subCategory] || 0) + amount;
                }
            });

            document.getElementById('total-income').innerText = formatter.format(totalIncome);
            document.getElementById('total-expense').innerText = formatter.format(totalExpense);
            let balance = totalIncome - totalExpense;
            document.getElementById('net-balance').innerText = formatter.format(balance);
            document.getElementById('net-balance').className = balance >= 0 ? 'income-text' : 'expense-text';

            new Chart(document.getElementById('timelineChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: 'Income', data: dates.map(d => incomeByDate[d]), borderColor: '#00ffcc', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,204,0.1)' },
                        { label: 'Expense', data: dates.map(d => expenseByDate[d]), borderColor: '#ff3366', tension: 0.4, fill: true, backgroundColor: 'rgba(255,51,102,0.1)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } }, x: { ticks: { color: '#888' } } } }
            });

            new Chart(document.getElementById('expenseCategoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(expensesBySub),
                    datasets: [{ data: Object.values(expensesBySub), backgroundColor: ['#ff3366', '#ff6680', '#cc0033', '#990026', '#ffb3bf'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }, cutout: '70%' }
            });

            document.getElementById('status-message').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';
        }

        Papa.parse("data.csv", {
            download: true,
            complete: function(results) { buildDashboard(results.data); },
            error: function() { document.getElementById('status-message').innerHTML = "Error loading data.csv"; }
        });
    </script>
</body>
</html>
